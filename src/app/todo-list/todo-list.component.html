<div class="todo">
  <div class="actionbar">
    <div class="searchbar">
      <input #searchInput type="text" placeholder="Enter a new todo task">
    </div>
    <div class="addbutton">
      <button (click)="addItem(searchInput.value)">ADD</button>
    </div>
  </div>
  <div class="result">
    <ul class="result_list">
      <li *ngFor="let item of items" class="list_item">{{ item }}</li>
    </ul>
  </div>
</div>
