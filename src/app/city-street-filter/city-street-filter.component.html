<div [formGroup]="form">
  <div class="filters">
    <div>
      <label>Cities</label>
      <select formControlName="city" class="form-control select">
        <option *ngFor="let city of (cities$ | async)" [value]="city.name">{{city.name}}</option>
      </select>
    </div>
    <div>
      <label>Street</label>
      <select formControlName="street" class="form-control select">
        <option *ngFor="let street of (streets$ | async)">{{street}}</option>
      </select>
    </div>
  </div>
</div>
