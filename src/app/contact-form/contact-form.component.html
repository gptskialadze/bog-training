<div class="container">

  <div class="text">
    Contact us Form
  </div>

  <form [formGroup]="contactForm" (ngSubmit)="onContactFormSubmit()">
    <button class="copy" [disabled]="isCopyButtonDisabled" (click)="onCopyClick()">COPY</button>
    <div class="form-row">
      <div class="input-data">
        <input type="text" required formControlName="firstName">
        <div class="underline"></div>
        <label for="">First Name</label>
      </div>
      <div class="input-data">
        <input type="text" required formControlName="lastName">
        <div class="underline"></div>
        <label for="">Last Name</label>
      </div>
    </div>
    <div class="form-row">
      <div class="input-data">
        <input type="text" formControlName="email">
        <div class="underline"></div>
        <label for="">Email Address</label>
      </div>
      <div class="input-data">
        <input type="text" required formControlName="website">
        <div class="underline"></div>
        <label for="">Website Name</label>
      </div>
    </div>
    <div class="form-row">
      <div class="input-data textarea">
        <textarea rows="8" cols="80" formControlName="message"></textarea>
        <br />
        <div class="underline"></div>
        <label for="">Write your message</label>
        <br />
        <div class="form-row submit-btn">
          <div class="input-data">
            <div class="inner"></div>
            <input type="submit" value="submit">
          </div>
        </div>
      </div>
    </div>
  </form>

  <p *ngIf="errorMessage" style="color: red;">{{ errorMessage }}</p>

</div>
