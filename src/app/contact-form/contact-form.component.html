<div class="container">
  <div class="text">
    Contact us Form
  </div>
  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
    <button type="button" class="copy" (click)="onCopy()" [disabled]="disableCopyButton">COPY</button>
    <div class="form-row">
      <div class="input-data">
        <input type="text" formControlName="firstName" required/>
        <div class="underline"></div>
        <label for="">First Name</label>
      </div>
      <div class="input-data">
        <input type="text" formControlName="lastName" required/>
        <div class="underline"></div>
        <label for="">Last Name</label>
      </div>
    </div>
    <div class="form-row">
      <div class="input-data">
        <input type="email" formControlName="email"/>
        <div class="underline"></div>
        <label for="">Email Address</label>
      </div>
      <div class="input-data">
        <input type="text" formControlName="website" required/>
        <div class="underline"></div>
        <label for="">Website Name</label>
      </div>
    </div>
    <div class="form-row">
      <div class="input-data textarea">
        <textarea formControlName="message" rows="8" cols="80" required></textarea>
        <br/>
        <div class="underline"></div>
        <label for="">Write your message</label>
        <br/>
        <div class="form-row submit-btn">
          <div class="input-data">
            <div class="inner"></div>
            <input type="submit" value="submit">
          </div>
        </div>
      </div>
    </div>
    <div *ngIf="errors.length > 0" style="color: red;">
      <ul>
        <li *ngFor="let error of errors">{{ error }}</li>
      </ul>
    </div>
  </form>
</div>
